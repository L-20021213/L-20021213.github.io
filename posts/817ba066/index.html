方面小米给我带来了惊艳的拍摄体验它配备了徕卡专业光学镜头和徕卡超广角镜头还有徕卡浮动长焦镜头主摄像头像素高达万前置摄像头也有万像素让我能够拍摄出清晰细腻的照片更令人兴奋的是它还支持和视频的录制小米内置了的电池容量支持有线充电和无线充电这真是让我惊叹的地方亲测充满电仅需分钟这意味着在外出时我几乎不再需要依赖充电宝这种快速充电的便利让我感到非常满意贴膜和手机壳第一次使用曲面屏贴膜成为了一大难题打开淘宝后我感到有些傻眼以前我使用直屏手机时买过很多十几块钱的钢化膜但这次在淘宝搜索时直接吓到了钢化膜的价格几乎都在大几十甚至上百元别跟我硬刚说有便宜的因为那些便宜的基本都是水凝膜目前市面上钢化膜应该比较多之前看朋友用过但碎了之后特别难清理搞不好还会伤屏幕于是我直接放弃了这种选择最后在做了各种功课之后我选择了闪魔的全胶钢化膜打完折块钱一张这是我这辈子买过最贵的钢化膜了心都在滴血这种膜的贴法和普通的钢化膜差不多碎了之后撕起来就方便了而且还有贴膜仓简直是手残党和强迫症的福音贴完之后完美贴合一点灰尘都没有但是经过测试之后发现指纹失效了刚开始还以为是手机坏了后来才意识到是钢化膜的原因重新录制指纹后可以正常使用了只是要稍微用点力才能识别而且在某些特殊情况下无法识别于是又设置了一个图案解锁毕竟家里没矿元的钢化膜已经远远超出我的预期了因为小米的镜头模组相对较大我在购买前做了很多功课纠结是否要贴镜头膜因为全包的手机壳实在是太丑了但是在网上观看了一系列视频后我还是打消了这个念头因为发现镜头膜对画质的影响还是挺大的至于手机壳本来准备购买一个四五十元的但因为贴膜的费用让预算超出了于是我选择了一款十几块钱的手机壳上手之后感觉还不错就这样不挑了吧各种设置关闭系统更新众所周知目前市面上的电子产品随着系统更新都会越来越糟各种负优化让人恼火我也深受其害最严重的就是我的了因此这次手机到手后第一件事就是关闭系统更新对于小米手机来说关闭更新方法比较特殊之前使用华为手机时用鸿蒙工具箱就可以关闭更新但小米的不能用而且即使在设置里关闭也会自动开启更新真是让人很不舒服但经过一番查找终于找到了一个相对靠谱的方法小米机型更新的默认下载在内部存储设备路径中我们要做的就是用其他文件覆盖掉文件夹让它无处可下具体步骤如下首先将原来的文件夹删除接着找一个无用的文件放到原来的路径中然后将该文件重命名为注意是用文件改名并且没有后缀确保改完之后是打不开的设置桌面打开设置选择桌面关闭智能助理和桌面搜索关闭广告以下方法只是临时搜索用来水文的其实是时间有点久了我也不记得我设置了多少东西了给指条路吧抖音搜索关闭小米手机广告大概看三个视频左右就能关闭的七七八八了天气右上角三点设置用户体验计划全关下载管理右上角三点设置信息流设置全关游戏中心我的设置隐私设置个性化服务关主题壁纸我的右上角设置隐私设置个性化推荐关日历右上角三点设置用户体验计划内容推广关短信高级设置允许推送关音乐通用设置其他个性化内容推荐和个性化广告推送关小爱同学关于小爱隐私设置个性化广告推荐关换手机管家经过各路大佬测试证实小米的手机管家是会影响手机的续航的好家伙我直呼好家伙小米这波操作很随后看了站主派大宝的测试视频换成了提取版手机管家版本注小米的系统软件只能安装比出场版本高的版本所以只能用其它手机的手机管家达成曲线救国的目的了忽略更新终于看到一个人性化功能了小木手机的应用市场软件更新可以选择忽略更新忽略之后就不会再提醒更新了即使不小心更新了也可以去应用管理里卸载更新回到出场版本以下都是我建议的忽略的手机管家系统更新小爱建议快应用服务框架专门弹广告的建议禁止联网服务与反馈其它在使用过程中会发现有些系统应用一直处于后台怎么都杀不掉比如手机自带的万能遥控应对这种问题我摸索出来的处理方法是去应用管理里面卸载重下就完美解决了小结因为这篇开箱文章托的太久了从新建文件到现在过去了一个多月以至于很多细节记不清了写的很像广告小米打钱哈哈哈哈哈但是大致过程就是这样的后面如果有什么骚操作会持续更新的",isPost:!0,isHome:!1,isHighlightShrink:!1,isToc:!0,postUpdate:"2024-03-23 12:38:06",postMainColor:"#646362"}</script><noscript><style>#nav{opacity:1}.justified-gallery img{opacity:1}#post-meta time,#recent-posts time{display:inline!important}</style></noscript><script>(e=>{e.saveToLocal={set:(e,t,a)=>{if(0===a)return;const o={value:t,expiry:Da
